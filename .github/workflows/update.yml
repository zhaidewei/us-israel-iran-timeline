name: Update Timeline Data

on:
  schedule:
    # 每小时整点运行一次（UTC），对应北京时间每小时
    - cron: '0 * * * *'
  workflow_dispatch:  # 支持手动触发（首次部署后用来初始化数据）

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data update
        run: node scripts/update.js
        env:
          DEEPL_TOKEN:                ${{ secrets.DEEPL_TOKEN }}
          DEEPSEEK_API_TOKEN:         ${{ secrets.DEEPSEEK_API_TOKEN }}
          # 支持 Vercel KV 和 Upstash Redis 两种变量名，填其中一组即可
          KV_REST_API_URL:            ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN:          ${{ secrets.KV_REST_API_TOKEN }}
          UPSTASH_REDIS_REST_URL:     ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN:   ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
