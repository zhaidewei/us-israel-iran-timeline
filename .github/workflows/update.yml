name: Update Timeline Data

on:
  # 定时任务已禁用 — 改由本机 launchd 每小时执行（避免 GitHub Actions 版本与本地不同步导致数据损坏）
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch:  # 保留手动触发入口，仅在需要时使用

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data update
        run: node scripts/update.js
        env:
          DEEPL_TOKEN:                ${{ secrets.DEEPL_TOKEN }}
          DEEPSEEK_API_TOKEN:         ${{ secrets.DEEPSEEK_API_TOKEN }}
          # 支持 Vercel KV 和 Upstash Redis 两种变量名，填其中一组即可
          KV_REST_API_URL:            ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN:          ${{ secrets.KV_REST_API_TOKEN }}
          UPSTASH_REDIS_REST_URL:     ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN:   ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
